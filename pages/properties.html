<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Propriétés</title>
    <style>
        table { border-collapse: collapse; width: 100%; margin-top: 20px; font-family: sans-serif; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <a href="logout.php"><button id="logout" class="logoutBtn">Logout</button></a>

    <h1>Liste des biens immobiliers</h1>

    <p id="message">Chargement des biens...</p>

    <table id="propertiesTable" style="display: none;">
        <thead>
            <tr>
                <th>Title</th>
                <th>City</th>
                <th>Surface (m²)</th>
                <th>Adresse</th>
                <th>Prix (€)</th>
                <th>Type</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="propertiesContainer">
            </tbody>
    </table>

    <script>
        // Dès que la page est chargée, on va chercher les données
        document.addEventListener("DOMContentLoaded", function() {
            
            // Appel AJAX vers ton fichier PHP
            fetch('get_properties.php')
                .then(response => response.json()) // On convertit la réponse en JSON
                .then(properties => {
                    const messageElement = document.getElementById('message');
                    const tableElement = document.getElementById('propertiesTable');
                    const container = document.getElementById('propertiesContainer');

                    if (properties.length === 0) {
                        messageElement.textContent = "Aucun résultat trouvé.";
                        return;
                    }

                    // On efface le message de chargement et on montre le tableau
                    messageElement.style.display = 'none';
                    tableElement.style.display = 'table';

                    // Boucle sur chaque propriété pour créer le HTML
                    properties.forEach(property => {
                        const row = document.createElement('tr');
                        
                        row.innerHTML = `
                            <td>${escapeHtml(property.title)}</td>
                            <td>${escapeHtml(property.city)}</td>
                            <td>${escapeHtml(property.surface)}</td>
                            <td>${escapeHtml(property.address)}</td>
                            <td>${escapeHtml(property.prix)}</td>
                            <td>${escapeHtml(property.type)}</td>
                            <td>${escapeHtml(property.status)}</td>
                        `;
                        
                        container.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('Erreur:', error);
                    document.getElementById('message').textContent = "Erreur lors du chargement des données.";
                    document.getElementById('message').className = "error";
                });
        });

        // Petite fonction de sécurité pour éviter les failles XSS en JS (équivalent de htmlspecialchars)
        function escapeHtml(string) {
            return String(string).replace(/[&<>"']/g, function (s) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s];
            });
        }
    </script>
</body>
</html>
